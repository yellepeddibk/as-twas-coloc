name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── NOTE: CI must NOT download GTEx data, PredictDB models,
      # or run real MetaXcan / R / coloc. All tests use mock mode only. ──

      - name: Run tests (mock mode only)
        run: |
          python -m pytest tests/ -v --tb=short

      - name: "Smoke test: run_pipeline.py --mock"
        run: |
          python scripts/run_pipeline.py --mock --base-dir /tmp/pipeline_smoke_test
